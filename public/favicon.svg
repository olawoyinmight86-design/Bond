      <stop stop-color="#f43f5e" stop-opacity="0.25"/>
      <stop offset="0.6" stop-color="#f43f5e" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#f43f5e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="6" y1="8" x2="42" y2="40" gradientUnits="userSpaceOnUse">
